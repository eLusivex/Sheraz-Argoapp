# Create a deployment file
cat > deployment.yaml << 'EOF'
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sheraz-app
  labels:
    app: sheraz-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sheraz-app
  template:
    metadata:
      labels:
        app: sheraz-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
EOF

# Create a service file
cat > service.yaml << 'EOF'
apiVersion: v1
kind: Service
metadata:
  name: sheraz-app-service
spec:
  selector:
    app: sheraz-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: LoadBalancer
EOF

