apiVersion: apps/v1
kind: Deployment
metadata:
  name: sheraz-app
  labels:
    app: sheraz-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: sheraz-app
  template:
    metadata:
      labels:
        app: sheraz-app
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
